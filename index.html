<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>D2R Items</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow">Diablo II Resurrected</p>
        <h1>Catalogo de items</h1>
        <p id="section-lead" class="lead">Items unicos con base, niveles, imagen, estadisticas y rolls.</p>
      </div>
      <div class="hero__panel" aria-label="Resumen">
        <span id="total-count">0</span>
        <small id="total-label">items cargados</small>
      </div>
    </header>

    <main>
      <nav class="sections" aria-label="Secciones del catalogo">
        <button class="section-tab section-tab--active" type="button" data-section="unique">Unicos</button>
        <button class="section-tab" type="button" data-section="set">Sets</button>
        <button class="section-tab" type="button" data-section="base">Bases</button>
        <button class="section-tab" type="button" data-section="runeword">Runewords</button>
        <button class="section-tab" type="button" data-section="charm">Charms</button>
        <button class="section-tab" type="button" data-section="jewel">Jewels</button>
        <button class="section-tab" type="button" disabled>Magicos y rares</button>
      </nav>

      <section class="toolbar" aria-label="Filtros de items">
        <div class="toolbar__row toolbar__row--main">
          <label class="search">
            <span>Buscar</span>
            <input id="search" type="search" placeholder="Shako, War Traveler, resist, damage..." autocomplete="off" />
          </label>

          <label>
            <span>Familia</span>
            <select id="family-filter"></select>
          </label>

          <label>
            <span>Subtipo</span>
            <select id="subtype-filter"></select>
          </label>

          <label>
            <span>Tier</span>
            <select id="tier-filter"></select>
          </label>

          <label>
            <span>Propiedad</span>
            <select id="property-filter"></select>
          </label>
        </div>

        <div class="toolbar__row toolbar__row--extra">
          <label>
            <span>Tenencia</span>
            <select id="owned-filter">
              <option value="all">Todos</option>
              <option value="owned">Solo los que tengo</option>
              <option value="missing">Solo los que no tengo</option>
            </select>
          </label>

          <label id="charm-type-label" hidden>
            <span>Tipo charm</span>
            <select id="charm-type-filter">
              <option value="all">Todos</option>
              <option value="small">Small Charm</option>
              <option value="medium">Medium Charm</option>
              <option value="grand">Grand Charm</option>
              <option value="unique">Unique Charms</option>
            </select>
          </label>

          <label id="jewel-type-label" hidden>
            <span>Tipo jewel</span>
            <select id="jewel-type-filter">
              <option value="all">Todos</option>
              <option value="jewel">Jewel</option>
              <option value="unique">Unique Jewels</option>
            </select>
          </label>

          <label>
            <span>Orden</span>
            <select id="sort-filter">
              <option value="requiredLevel">Nivel requerido</option>
              <option value="name">Nombre</option>
              <option value="level">Nivel de item</option>
              <option value="ownedCount">Cantidad disponible</option>
            </select>
          </label>

          <label>
            <span>Direccion</span>
            <select id="sort-direction">
              <option value="asc">Ascendente</option>
              <option value="desc">Descendente</option>
            </select>
          </label>

          <label class="check">
            <input id="variable-filter" type="checkbox" />
            <span>Solo con rolls variables</span>
          </label>

          <button id="refresh-owned" class="refresh-button" type="button">Refrescar saves</button>
        </div>
      </section>

      <section class="summary" aria-live="polite">
        <strong id="visible-count">0</strong>
        <span>items visibles</span>
        <span class="dot"></span>
        <span id="source"></span>
        <span class="dot"></span>
        <span id="owned-status">Saves no leidos</span>
      </section>

      <section id="owned-detail" class="owned-detail" hidden>
        <button id="owned-close" class="owned-detail__close" type="button">Cerrar</button>
        <p class="owned-detail__label">Disponibles</p>
        <h3 id="owned-title"></h3>
        <p id="owned-subtitle"></p>
        <ul id="owned-list"></ul>
      </section>

      <section id="items" class="grid" aria-label="Items"></section>
    </main>

    <template id="item-template">
      <article class="item-card">
        <div class="item-card__top">
          <div class="item-art">
            <img alt="" loading="lazy" />
            <span class="item-art__fallback"></span>
          </div>
          <div>
            <p class="item-card__base"></p>
            <h2></h2>
            <div class="badges"></div>
          </div>
        </div>
        <dl class="base-stats"></dl>
        <ul class="props"></ul>
      </article>
    </template>

    <script src="data/uniques.js"></script>
    <script src="data/sets.js"></script>
    <script src="data/bases.js"></script>
    <script src="data/runewords.js"></script>
    <script src="data/image-overrides.js"></script>
    <script src="app.js"></script>
  </body>
</html>
