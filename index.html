<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>D2R Items</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="hero__content">
        <p class="eyebrow">Diablo II Resurrected</p>
        <h1>Item catalog</h1>
        <p id="section-lead" class="lead">Unique items with base, levels, image, stats and rolls.</p>
      </div>
      <div class="hero__panel" aria-label="Summary">
        <span id="total-count">0</span>
        <small id="total-label">items loaded</small>
      </div>
    </header>

    <main>
      <nav class="sections" aria-label="Catalog sections">
        <button class="section-tab section-tab--active" type="button" data-section="unique">Uniques</button>
        <button class="section-tab" type="button" data-section="set">Sets</button>
        <button class="section-tab" type="button" data-section="base">Bases</button>
        <button class="section-tab" type="button" data-section="runeword">Runewords</button>
        <button class="section-tab" type="button" data-section="charm">Charms</button>
        <button class="section-tab" type="button" data-section="jewel">Jewels</button>
        <button class="section-tab" type="button" data-section="magicrare">Magic & Rare</button>
        <button class="section-tab" type="button" data-section="ring">Rings</button>
        <button class="section-tab" type="button" data-section="amulet">Amulets</button>
      </nav>

      <section class="toolbar" aria-label="Item filters">
        <div class="toolbar__row toolbar__row--main">
          <label class="search">
            <span>Search</span>
            <input id="search" type="search" placeholder="Shako, War Traveler, resist, damage..." autocomplete="off" />
          </label>

          <label>
            <span>Family</span>
            <select id="family-filter"></select>
          </label>

          <label>
            <span>Subtype</span>
            <select id="subtype-filter"></select>
          </label>

          <label>
            <span>Tier</span>
            <select id="tier-filter"></select>
          </label>

          <label>
            <span>Property</span>
            <select id="property-filter"></select>
          </label>
        </div>

        <div class="toolbar__row toolbar__row--extra">
          <label>
            <span>Ownership</span>
            <select id="owned-filter">
              <option value="all">All</option>
              <option value="owned">Only owned</option>
              <option value="missing">Only missing</option>
            </select>
          </label>

          <label id="charm-type-label" hidden>
            <span>Charm type</span>
            <select id="charm-type-filter">
              <option value="all">All</option>
              <option value="small">Small Charm</option>
              <option value="medium">Medium Charm</option>
              <option value="grand">Grand Charm</option>
              <option value="unique">Unique Charms</option>
            </select>
          </label>

          <label id="jewel-type-label" hidden>
            <span>Jewel type</span>
            <select id="jewel-type-filter">
              <option value="all">All</option>
              <option value="jewel">Jewel</option>
              <option value="unique">Unique Jewels</option>
            </select>
          </label>

          <label id="magic-type-label" hidden>
            <span>Quality</span>
            <select id="magic-type-filter">
              <option value="all">All</option>
              <option value="Magic">Magic (blue)</option>
              <option value="Rare">Rare (yellow)</option>
              <option value="Crafted">Crafted</option>
              <option value="Set">Set (green)</option>
              <option value="Unique">Unique (gold)</option>
            </select>
          </label>

          <label>
            <span>Sort</span>
            <select id="sort-filter">
              <option value="requiredLevel">Required level</option>
              <option value="name">Name</option>
              <option value="level">Item level</option>
              <option value="ownedCount">Available count</option>
            </select>
          </label>

          <label>
            <span>Direction</span>
            <select id="sort-direction">
              <option value="asc">Ascending</option>
              <option value="desc">Descending</option>
            </select>
          </label>

          <label class="check">
            <input id="variable-filter" type="checkbox" />
            <span>Variable rolls only</span>
          </label>

          <button id="reset-filters" class="reset-button" type="button">Reset filters</button>

          <button id="refresh-owned" class="refresh-button" type="button">Refresh saves</button>
        </div>
      </section>

      <section class="summary" aria-live="polite">
        <strong id="visible-count">0</strong>
        <span>visible items</span>
        <span class="dot"></span>
        <span id="source"></span>
        <span class="dot"></span>
        <span id="owned-status">Saves not read</span>
      </section>

      <section id="owned-detail" class="owned-detail" hidden>
        <button id="owned-close" class="owned-detail__close" type="button">Close</button>
        <p class="owned-detail__label">Available</p>
        <h3 id="owned-title"></h3>
        <p id="owned-subtitle"></p>
        <ul id="owned-list"></ul>
      </section>

      <section id="items" class="grid" aria-label="Items"></section>
    </main>

    <template id="item-template">
      <article class="item-card">
        <div class="item-card__top">
          <div class="item-art">
            <img alt="" loading="lazy" />
            <span class="item-art__fallback"></span>
          </div>
          <div>
            <p class="item-card__base"></p>
            <h2></h2>
            <div class="badges"></div>
          </div>
        </div>
        <dl class="base-stats"></dl>
        <ul class="props"></ul>
      </article>
    </template>

    <script src="data/uniques.js"></script>
    <script src="data/sets.js"></script>
    <script src="data/bases.js"></script>
    <script src="data/runewords.js"></script>
    <script src="data/image-overrides.js"></script>
    <script src="app.js"></script>
  </body>
</html>
